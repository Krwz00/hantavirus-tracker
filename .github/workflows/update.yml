name: Update tracker feeds

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update news feed
        run: python scripts/update_news.py

      - name: Update fact-checks
        run: python scripts/update_factchecks.py

      - name: Commit updated JSON
        run: |
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add data/news.json data/factchecks.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: update feeds $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
