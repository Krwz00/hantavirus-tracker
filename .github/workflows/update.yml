name: Update tracker feeds

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update news feed
        run: python scripts/update_news.py

      - name: Update fact-checks
        run: python scripts/update_factchecks.py

      - name: Commit updated JSON
        run: |
          set -e
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add data/news.json data/factchecks.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "auto: update feeds $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry push to survive races with parallel commits (e.g. human edit during run).
          # Each attempt: rebase local commit on top of the latest remote, then push.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push origin main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push attempt $i failed, retrying after 5s..."
            sleep 5
          done
          echo "Push failed after 5 attempts." >&2
          exit 1
